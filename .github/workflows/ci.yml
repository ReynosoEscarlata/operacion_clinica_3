name: CI

# Paths filter agregado en Challenge 4 (Fase 1): este workflow es el del
# monolito (Challenge 3) y solo debe correr cuando cambia código del
# monolito, no cuando cambia un servicio nuevo en services/** o el gateway
# (cada uno tiene su propio workflow con su propio paths filter) — esto es
# lo que habilita "deploy independiente por servicio".
on:
  push:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'admin/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.eslintrc.cjs'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'admin/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.eslintrc.cjs'
      - '.github/workflows/ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
          POSTGRES_DB: clinic_scheduler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://clinic:clinic@localhost:5432/clinic_scheduler?schema=public
      REDIS_URL: redis://localhost:6379
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      RESEND_API_KEY: re_dummy
      RESEND_FROM_EMAIL: no-reply@clinica.example.com
      ADMIN_API_KEY: ci-admin-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Test
        run: npm run test
